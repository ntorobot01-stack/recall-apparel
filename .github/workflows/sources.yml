name: Update product catalog from sources

on:
  schedule:
    # Cada 6 horas (00:00, 06:00, 12:00, 18:00 UTC).
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sources
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run sources
        run: npm run sources:run

      - name: Commit and push if catalog changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/products.json
          if git diff --cached --quiet; then
            echo "No catalog changes — skipping commit."
            exit 0
          fi
          git commit -m "chore(sources): update product catalog [skip ci]"
          git push origin main
